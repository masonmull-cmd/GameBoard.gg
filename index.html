<!-- ========== LOBBY SCREEN ========== -->
<div id="lobbyScreen">
    <header class="main-header">
        <h1 class="logo glitch" data-text="CS2 BOARD">CS2 BOARD</h1>
        <p class="tagline">Counter-Strike 2 &bull; Monopoly Style</p>
    </header>
    <main class="lobby-container">
        <div class="glass-panel menu-panel">
            <h2 class="panel-title neon-text">NEW MATCH</h2>
            <div class="form-group">
                <label>Players (2-4)</label>
                <div class="range-row">
                    <input type="range" id="playerCount" min="2" max="4" value="2" oninput="updateSetup()">
                    <span id="playerCountVal" class="range-value">2</span>
                </div>
            </div>
            <div id="playerSetups"></div>
            <button class="btn btn-primary glow" onclick="startGame()">⚡ START MATCH</button>
        </div>
    </main>
</div>

<!-- ========== GAME SCREEN ========== -->
<div id="gameScreen" class="hidden">
    <!-- HUD -->
    <div class="game-hud">
        <div class="hud-left"><span class="hud-logo">CS2 BOARD</span></div>
        <div class="hud-center" id="turnBanner"></div>
        <div class="hud-right">
            <button class="btn-small" onclick="if(confirm('Quit match?'))location.reload()">✕</button>
        </div>
    </div>

    <div class="game-layout">
        <!-- Players sidebar -->
        <div class="sidebar" id="playerPanel"></div>

        <!-- Board -->
        <div class="board-area">
            <div class="board" id="board">
                <!-- 40 cells rendered by JS -->
                <div class="board-center">
                    <div class="center-title glitch" data-text="CS2">CS2</div>
                    <div class="center-sub">BOARD</div>
                    <div class="dice-box" id="diceBox">
                        <span class="die" id="d1">⚀</span>
                        <span class="die" id="d2">⚀</span>
                    </div>
                    <div id="rollTotal" class="roll-total"></div>
                    <button id="rollBtn" class="btn btn-primary roll-btn glow" onclick="rollDice()">🎲 ROLL</button>
                    <div id="actionBtns" class="action-btns"></div>
                </div>
            </div>
        </div>

        <!-- Log sidebar -->
        <div class="sidebar log-sidebar">
            <div class="glass-panel log-panel">
                <h3>📋 Match Log</h3>
                <div id="gameLog" class="log-entries"></div>
            </div>
        </div>
    </div>
</div>

<!-- Property popup -->
<div id="propModal" class="modal hidden">
    <div class="glass-panel modal-content" id="propModalBody"></div>
</div>

<!-- Card popup (Loot / Supply) -->
<div id="cardModal" class="modal hidden">
    <div class="glass-panel modal-content card-popup">
        <div id="cardBody"></div>
        <button class="btn btn-primary" onclick="closeCard()">OK</button>
    </div>
</div>

<!-- Winner overlay -->
<div id="winOverlay" class="modal hidden">
    <div class="glass-panel modal-content winner-box">
        <h2 class="neon-text gold">🏆 ACE! 🏆</h2>
        <p id="winMsg"></p>
        <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
    </div>
</div>

<script src="js/data.js"></script>
<script src="js/game.js"></script>
